spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    #linux with docker
    url: jdbc:mysql://localhost:3314/gameeval?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    #windows with local mysql
    #url: jdbc:mysql://localhost:3306/gameeval?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      port: 6379
      password: redis123456
      database: 0
      timeout: 5000ms
      lettuce:
        client-options:
          protocol-version: RESP2
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# MyBatis Plus配置
mybatis-plus:
  type-aliases-package: com.eval.gameeval.models.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.example.log: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# 项目配置
server:
  port: 8080

app:
  admin:
    init:
      # 首次部署初始化账号：仅在 sys_user 为空时尝试创建
      enabled: ${APP_ADMIN_INIT_ENABLED:true}
      username: ${APP_ADMIN_INIT_USERNAME:}
      # 与 password-hash 二选一；推荐在生产环境使用 password-hash
#      password: ${APP_ADMIN_INIT_PASSWORD:}
      password-hash: ${APP_ADMIN_INIT_PASSWORD_HASH:}
      name: ${APP_ADMIN_INIT_NAME:System Admin}
      role: ${APP_ADMIN_INIT_ROLE:super_admin}
      is-enabled: ${APP_ADMIN_INIT_IS_ENABLED:true}

