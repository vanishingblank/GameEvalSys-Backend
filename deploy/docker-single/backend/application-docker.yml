spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST:mariadb}:${DB_PORT:3306}/${DB_NAME:gameeval}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USER:gameeval}
    password: ${DB_PASSWORD:change_me}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:change_me}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        client-options:
          protocol-version: RESP2
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

server:
  port: 8080

app:
  admin:
    init:
      # 首次部署初始化账号：仅在 sys_user 为空时尝试创建
      enabled: ${APP_ADMIN_INIT_ENABLED:true}
      username: ${APP_ADMIN_INIT_USERNAME:}
      # 与 password-hash 二选一；推荐在生产环境使用 password-hash
      #      password: ${APP_ADMIN_INIT_PASSWORD:}
      password-hash: ${APP_ADMIN_INIT_PASSWORD_HASH:}
      name: ${APP_ADMIN_INIT_NAME:System Admin}
      role: ${APP_ADMIN_INIT_ROLE:super_admin}
      is-enabled: ${APP_ADMIN_INIT_IS_ENABLED:true}

